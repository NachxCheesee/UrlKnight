name: 🚀 Release UrlKnight Exe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v5

    - name: 🐍 Configurar Python 3.13.2
      uses: actions/setup-python@v6
      with:
        python-version: '3.13.2'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔨 Compilar a ejecutable (.exe)
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon "assets/UrlKnight.ico" --add-data "assets;assets" --name "UrlKnight" src/main.py

    - name: 🚀 Crear Release en GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: dist/UrlKnight.exe
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}