name: Build UrlKnight Exe

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 

    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python 3.13.2
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.2'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 🔨 Compilar a ejecutable (.exe)
      run: |
        pyinstaller --onefile --name UrlKnight main.py

    - name: 📤 Subir el archivo compilado
      uses: actions/upload-artifact@v4
      with:
        name: UrlKnight-Windows-Exe
        path: dist/UrlKnight.exe